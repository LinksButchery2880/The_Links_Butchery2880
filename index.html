<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Butchery Order Forms</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      height: 100vh;
      background: #ffffff;
      color: #000;
    }

    h1 {
      margin-top: 60px;
      font-size: 40px;
    }

    /* 🔥 LOGO STYLE */
    .logo {
      width: 350px;              /* bigger logo */
      margin: 20px auto 10px;    /* closer to buttons */
      display: block;
      opacity: 0.95;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
    }

    .container {
      margin-top: 10px;          /* pulls buttons closer */
    }

    button {
      padding: 18px 35px;
      font-size: 18px;
      margin: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    /* 🔵 Standard */
    .standard {
      background-color: #007BFF;
      color: white;
    }

    /* 🟠 EXT */
    .ext {
      background-color: #FF8800;
      color: white;
    }

    /* ✨ Hover effect */
    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

  </style>
</head>

<body>

  <h1>Inn Collection Group Butchery Ordering Portal</h1>

  <!-- 🔥 LOGO HERE -->
  <img src="logo.png" class="logo">

  <div class="container">

    <a href="https://forms.cloud.microsoft/e/Hg4jKcADAu" target="_blank">
      <button class="standard">Place Orders Here</button>
    </a>

    <a href="https://forms.cloud.microsoft/e/JiVkBPVxVT" target="_blank">
      <button class="ext">Confirm Your Order Here</button>
    </a>

  </div>

</body>
</html>
