      font-size: 40px;
    }

    /* 🔥 LOGO STYLE */
    .logo {

      opacity: 0.95;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));

    button {
      padding: 18px 35px;
      font-size: 18px;
      margin: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    /* 🔵 Standard */

      background-color: #007BFF;
      color: white;
    }

    /* 🟠 EXT */
    .ext {
      background-color: #FF8800;
      color: white;
    }

    /* ✨ Hover effect */
    button:hover {
      transform: scale(1.05);
